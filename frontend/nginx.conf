upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP (port 80) — redirect everything to HTTPS if TLS is enabled, otherwise
# serve the site directly. The default behavior is redirect; comment out the
# `return 301` line to keep plain HTTP serving.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Permanent redirect to HTTPS. Drop this line if TLS is not configured yet
    # (e.g. cert files missing) — nginx would then fail to start on 443.
    return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS (port 443) — TLS terminated here, then reverse-proxies /api/* to the
# backend and serves the Vite SPA bundle for everything else.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    # TLS material — mounted from the host at /etc/nginx/ssl (see docker-compose)
    ssl_certificate     /etc/nginx/ssl/moncash-bi.crt;
    ssl_certificate_key /etc/nginx/ssl/moncash-bi.key;

    # Modern TLS baseline — drop TLSv1.2 to TLSv1.3-only if all clients are
    # up-to-date Windows 10+ / macOS 10.14+ / current mobile.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS — force browsers to remember HTTPS for 6 months. Comment out during
    # first tests, or if you might need to revert to HTTP temporarily.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # Uploads (ID Card scanner, bulk MSISDN uploads, etc.) can be a few MB.
    client_max_body_size 32M;

    # gzip static assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Frontend was built with VITE_API_BASE_URL=/api, so all requests come here.
    # We strip the /api prefix before forwarding so the FastAPI routes keep their
    # original paths (/customers/*, /operations/*, /auth/*, ...).
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Xlsx exports can take a while to stream; give them room.
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
        proxy_connect_timeout 30s;

        # Streaming responses (xlsx download, potential SSE later)
        proxy_buffering    off;
        proxy_request_buffering off;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Cache hashed bundle assets for a year (they're content-addressed by Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Any other path → index.html so react-router owns navigation
    location / {
        try_files $uri $uri/ /index.html;
    }
}
