# ─────────────────────────────────────────────────────────────────────────────
# MonCash BI Portal — Production stack
#
# Services:
#   frontend  : nginx serving the Vite bundle + reverse-proxying /api -> backend
#   backend   : FastAPI (Databricks SQL Connector, Azure Identity)
#   redis     : shared cache (optional but recommended if UVICORN_WORKERS > 1
#               or you plan to run multiple backend replicas)
#
# Deploy on a Linux host:
#   1. cp .env.example .env    (fill in secrets / Databricks / Azure SP)
#   2. docker compose build
#   3. docker compose up -d
#
# Reach the app at http://<server>:${WEB_PORT:-80}
# ─────────────────────────────────────────────────────────────────────────────
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: moncash/bi-backend:latest
    container_name: bi-backend
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      # ── Databricks ─────────────────────────────────────────────────────────
      DATABRICKS_SERVER_HOSTNAME: ${DATABRICKS_SERVER_HOSTNAME}
      DATABRICKS_HTTP_PATH:       ${DATABRICKS_HTTP_PATH}
      ANALYTICS_INPUT_PATH:       ${ANALYTICS_INPUT_PATH}

      # ── Azure Service Principal (picked up by DefaultAzureCredential) ─────
      # Required on non-Azure hosts; on Azure-hosted VMs you can rely on
      # managed identity and leave these unset.
      AZURE_TENANT_ID:            ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID:            ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET:        ${AZURE_CLIENT_SECRET}

      # ── JWT — MUST be strong random values in production ──────────────────
      SECRET_KEY:                 ${SECRET_KEY}
      REFRESH_SECRET_KEY:         ${REFRESH_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS:  ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

      # ── CORS — same-origin thanks to nginx reverse proxy, but keep this
      # aligned with any external host that might call the API directly.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}

      # ── Trusted hosts — Host header allow-list. Comma-separated hostnames
      # the FastAPI backend will accept. Leave empty to accept any host.
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}

      # ── Reverse-proxy prefix — nginx serves the backend at /api/*, so
      # root_path=/api lets Swagger UI resolve the OpenAPI schema + Try-it-out
      # requests through the same prefix.
      ROOT_PATH: ${ROOT_PATH:-/api}

      # ── Cache backend ─────────────────────────────────────────────────────
      CACHE_BACKEND: redis
      REDIS_URL:     redis://redis:6379/0
      CACHE_ENABLED: "true"
      CACHE_DEFAULT_TTL: ${CACHE_DEFAULT_TTL:-600}

      # ── Uvicorn workers ───────────────────────────────────────────────────
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    expose:
      - "8000"     # only reachable from other compose services (frontend/nginx)
    networks:
      - bi-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Frontend is built to hit /api on the same origin — nginx handles the
        # rewrite/proxy to the backend service inside the compose network.
        VITE_API_BASE_URL: /api
    image: moncash/bi-frontend:latest
    container_name: bi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_PORT_HTTPS:-443}:443"
    volumes:
      # TLS material (cert + key) mounted read-only from host. Points to a
      # directory containing moncash-bi.crt and moncash-bi.key (nginx.conf
      # references /etc/nginx/ssl/moncash-bi.{crt,key}).
      - ${SSL_CERT_DIR:-/etc/ssl/moncash-bi}:/etc/nginx/ssl:ro
    networks:
      - bi-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: bi-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "no"
    volumes:
      - redis_data:/data
    networks:
      - bi-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  redis_data:

networks:
  bi-net:
    driver: bridge
